title: CRA-RN no 2º Fórum de Presidentes do Sistema CFA/CRAs
description: >-
  O CRA-RN marcou presença no 2º Fórum de Presidentes do Sistema CFA/CRAs, um
  encontro estratégico voltado ao alinhamento institucional, à tomada de decisões
  relevantes e ao fortalecimento da Administração no Brasil. O evento trouxe
  importantes deliberações e excelentes perspectivas para os Profissionais de
  Administração do Rio Grande do Norte e de todo o país.
location: CRA-RN - Conselho Regional de Administração do Rio Grande do Norte
date: Dezembro 2025
sortDate: '2025-12-15'
