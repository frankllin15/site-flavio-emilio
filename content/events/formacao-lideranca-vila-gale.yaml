title: Formação em Liderança chega à 13ª Unidade Vila Galé
description: >-
  A Vila Galé Belém recebeu a formação em liderança, tornando-se a 13ª unidade
  do grupo a participar desse importante processo de desenvolvimento. Um momento
  especial de aprendizado, troca de experiências e fortalecimento de lideranças,
  à altura da energia e receptividade desse time incrível. Gratidão a todos os
  envolvidos!
location: Vila Galé Belém, Pará
date: Agosto 2025
sortDate: '2025-08-15'
image: /images/events/formacao-lideranca-vila-gale/image.jpg
